<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MeshCall — voice, video &amp; text over a live peer mesh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2242%22 fill=%22%230B0E11%22/><circle cx=%2250%22 cy=%2250%22 r=%2210%22 fill=%22%2335D399%22/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ============ LOGIN GATE ============ -->
<section id="gate" class="gate">
  <div class="gate-card">
    <div class="gate-mesh" aria-hidden="true">
      <canvas id="gateMesh" width="220" height="220"></canvas>
    </div>
    <p class="eyebrow">peer-to-peer · no media server · stun.l.google.com</p>
    <h1>MeshCall</h1>
    <p class="gate-sub">Text, voice, video and screen share — every stream flows straight between browsers. This box only ever exchanges a handshake.</p>

    <label class="field">
      <span>Callsign</span>
      <input id="nameInput" type="text" maxlength="32" placeholder="e.g. river" autocomplete="off" />
    </label>
    <label class="field">
      <span>Room</span>
      <input id="roomInput" type="text" maxlength="32" placeholder="e.g. lobby" autocomplete="off" value="lobby" />
    </label>
    <button id="joinBtn" class="btn btn-primary btn-block">Connect</button>
    <p id="gateError" class="gate-error" hidden></p>
  </div>
</section>

<!-- ============ MAIN APP ============ -->
<div id="app" class="app" hidden>

  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">MeshCall</span>
      <span class="brand-room">/ <span id="roomLabel"></span></span>
    </div>

    <div class="mesh-viz" title="Live peer mesh — each node is a browser, each line an active connection">
      <canvas id="meshCanvas" width="180" height="44"></canvas>
    </div>

    <div class="call-controls" id="callControls">
      <button id="joinAudioBtn" class="btn btn-ghost" data-tip="Join voice">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11h-2z"/></svg>
        <span>Voice</span>
      </button>
      <button id="joinVideoBtn" class="btn btn-ghost" data-tip="Join video">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
        <span>Video</span>
      </button>
      <button id="screenBtn" class="btn btn-ghost" hidden data-tip="Share screen">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 3H4a2 2 0 00-2 2v10a2 2 0 002 2h4l-1 3h10l-1-3h4a2 2 0 002-2V5a2 2 0 00-2-2zm0 12H4V5h16v10z"/></svg>
        <span id="screenBtnLabel">Share screen</span>
      </button>
      <button id="muteBtn" class="btn btn-ghost" hidden data-tip="Mute mic">Mic</button>
      <button id="camBtn" class="btn btn-ghost" hidden data-tip="Toggle camera">Cam</button>
      <button id="leaveCallBtn" class="btn btn-danger" hidden>Leave call</button>
    </div>
  </header>

  <div class="body">

    <!-- ===== Sidebar: roster ===== -->
    <aside class="roster">
      <div class="roster-head">
        <span>People</span>
        <span id="rosterCount" class="roster-count">0</span>
      </div>
      <div id="rosterList" class="roster-list"></div>

      <div class="roster-foot">
        <div class="you-row">
          <span class="status-dot online"></span>
          <span id="selfName" class="you-name"></span>
          <span class="you-tag">you</span>
        </div>
      </div>
    </aside>

    <!-- ===== Center: call stage + chat ===== -->
    <main class="stage">
      <div id="videoGrid" class="video-grid" hidden></div>

      <div class="chat-tabs" id="chatTabs">
        <button class="chat-tab active" data-thread="room">Room</button>
      </div>

      <div id="chatPanes" class="chat-panes">
        <div class="chat-pane active" data-thread="room">
          <div class="chat-log" id="roomLog"></div>
        </div>
      </div>

      <form id="composerForm" class="composer">
        <input id="composerInput" type="text" maxlength="4000" placeholder="Message #room" autocomplete="off" />
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </main>
  </div>
</div>

<template id="rosterItemTemplate">
  <div class="roster-item" data-id="">
    <span class="status-dot"></span>
    <span class="roster-name"></span>
    <span class="roster-call-badge" hidden></span>
    <button class="roster-dm-btn" title="Direct message">DM</button>
  </div>
</template>

<template id="videoTileTemplate">
  <div class="video-tile" data-id="">
    <video autoplay playsinline></video>
    <span class="video-tile-label"></span>
  </div>
</template>

<script src="/app.js"></script>
</body>
</html>
