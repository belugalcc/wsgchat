name = "meshcall"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Static frontend (public/index.html etc). Anything not matched by an asset
# falls through to the Worker's fetch handler below (that's how /ws/* reaches it).
[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Chat history storage. Create this namespace once with:
#   npx wrangler kv namespace create CHAT_KV
# then paste the "id" it prints in below (and again as preview_id for
# `wrangler dev`, using `npx wrangler kv namespace create CHAT_KV --preview`).
[[kv_namespaces]]
binding = "CHAT_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"
