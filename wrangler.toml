name = "wsgchat"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Static frontend (public/index.html etc). Anything not matched by an asset
# falls through to the Worker's fetch handler below (that's how /ws/* reaches it).
[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "ChatRoom"

# Free plan Durable Objects must use SQLite-backed storage, which needs the
# new_sqlite_classes migration key (new_classes is for the paid/legacy
# key-value backend and is what threw the 10097 error).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

# Chat history storage.
[[kv_namespaces]]
binding = "CHAT_KV"
id = "99de195282764157bc9ed47536154911"
