name = "meshcall"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Static frontend (public/index.html etc). Anything not matched by an asset
# falls through to the Worker's fetch handler below (that's how /ws/* reaches it).
[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# Chat history storage.
# Get your real ID from: Cloudflare dashboard -> Workers & Pages -> KV -> CHAT_KV
# or by running: npx wrangler kv namespace list
[[kv_namespaces]]
binding = "CHAT_KV"
id = "99de195282764157bc9ed47536154911"
